name: formulas

services:
  mysql:
    image: mysql:8.4
    container_name: formulas-mysql
    restart: unless-stopped
    cpus: "1.50"
    mem_limit: "1024m"
    mem_reservation: "512m"
    ports:
      - "${MYSQL_PORT}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - formulas-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  formulas-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: formulas-app
    restart: unless-stopped
    cpus: "1.00"
    mem_limit: "768m"
    mem_reservation: "384m"
    pids_limit: 256
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-formulas}
      MYSQL_USER: ${MYSQL_USER:-formulas}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-formulas}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/app/credentials/service-account.json}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-300}
      PDF_STAGING_DIR: /tmp/formulas/staging/pdfs
    command: ["node", "dist/index.js"]
    volumes:
      - ./credentials:/app/credentials:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - formulas-net

volumes:
  mysql_data:

networks:
  formulas-net:
    driver: bridge
